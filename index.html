<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>智能考试系统 · 学习/练习/统计看板</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 12px;
            line-height: 1.4;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 16px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 18px; padding-bottom: 10px; }
        h1 { color: #2c3e50; margin: 0; font-size: 1.6rem; }
        .dashboard { display: flex; gap: 18px; flex-wrap: wrap; }
        .library-panel, .func-panel { flex: 1.2; min-width: 280px; background: #fafbfc; border-radius: 16px; padding: 14px; border: 1px solid #e9ecef; }
        .exam-panel { flex: 2.8; min-width: 0; width: 100%; }
        .panel-title {
            font-size: 1.2rem; font-weight: 600; margin-bottom: 12px;
            border-left: 4px solid #3498db; padding-left: 10px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
        }
        .library-card { background: white; border-radius: 14px; padding: 12px; margin-bottom: 12px; border: 1px solid #eef2f6; }
        .lib-header { display: flex; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
        .lib-name { font-weight: bold; font-size: 0.9rem; word-break: break-all; }
        .stat-badge { display: flex; gap: 8px; margin: 8px 0; font-size: 0.75rem; flex-wrap: wrap; }
        .stat-badge span { background: #eef2fa; padding: 2px 8px; border-radius: 20px; }
        .ratio-control { display: flex; align-items: center; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
        .ratio-input { width: 70px; padding: 6px; border: 1px solid #ccc; border-radius: 8px; text-align: center; }
        .btn-small { background: #e74c3c; border: none; color: white; padding: 4px 12px; border-radius: 30px; cursor: pointer; }
        .control-panel {
            background: #f9f9f9; padding: 14px; border-radius: 16px; margin-bottom: 20px;
            display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
        }
        .control-group { display: flex; align-items: center; gap: 5px; background: white; padding: 4px 10px; border-radius: 30px; }
        .control-group input { width: 60px; padding: 6px; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        .btn {
            padding: 8px 14px; border: none; border-radius: 40px; cursor: pointer;
            font-size: 0.8rem; font-weight: 500; color: white;
        }
        .btn-primary { background-color: #3498db; }
        .btn-success { background-color: #2ecc71; }
        .btn-warning { background-color: #f39c12; }
        .btn-danger { background-color: #e74c3c; }
        .btn-purple { background-color: #9b59b6; }
        .btn-green { background-color: #27ae60; }
        .btn-outline { background: #6c757d; }
        #timer { font-size: 0.9rem; font-weight: bold; margin-left: auto; background: #2c3e50; color: white; padding: 4px 12px; border-radius: 40px; white-space: nowrap; }
        .question-block {
            background: #fff; border-left: 5px solid #3498db;
            padding: 14px 16px; margin-bottom: 18px; border-radius: 14px;
            word-wrap: break-word;
        }
        .options label { display: block; padding: 8px 12px; margin-bottom: 6px; border: 1px solid #e2e8f0; border-radius: 12px; cursor: pointer; transition: 0.1s; }
        .options label.selected-correct { background: #d4edda; border-color: #28a745; }
        .options label.selected-wrong { background: #f8d7da; border-color: #dc3545; }
        .result-feedback { padding: 10px; margin-top: 12px; border-radius: 12px; font-size: 0.85rem; }
        .correct { background: #e9f7ef; color: #2e7d32; border-left: 4px solid #2ecc71; }
        .incorrect { background: #fdedec; color: #c0392b; border-left: 4px solid #e74c3c; }
        .explanation { font-size: 0.8rem; color: #555; margin-top: 6px; }
        #scoreResult { text-align: center; font-size: 1.1rem; padding: 16px; display: none; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 20px; margin-bottom: 20px; }
        #examArea { display: none; }
        .toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2c3e50; color: white; padding: 10px 20px; border-radius: 40px; z-index: 1000; white-space: nowrap; }
        @media (max-width: 700px) {
            .dashboard { flex-direction: column; }
            .toast-msg { white-space: normal; max-width: 80%; text-align: center; }
        }
        .probability-buttons { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .total-ratio { background: #eef2ff; padding: 10px; border-radius: 14px; margin-top: 12px; text-align: center; }
        .bottom-submit { text-align: center; margin-top: 20px; }
        .more-menu { position: relative; display: inline-block; width: 100%; }
        .more-btn { background: #9b59b6; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; border: none; font-size: 0.9rem; font-weight: bold; width: 100%; }
        .more-content { display: none; position: absolute; background-color: white; min-width: 220px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); border-radius: 12px; z-index: 100; right: 0; margin-top: 5px; }
        .more-content a { color: #333; padding: 12px 16px; text-decoration: none; display: block; border-radius: 12px; cursor: pointer; }
        .more-content a:hover { background-color: #f1f1f1; }
        .show { display: block; }
        /* 统计看板样式 */
        .stats-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; margin-top: 12px; background: white; border-radius: 12px; overflow: hidden; }
        .stats-table th, .stats-table td { border: 1px solid #e2e8f0; padding: 6px 4px; text-align: center; }
        .stats-table th { background-color: #eef2ff; }
        .progress-bar { width: 100%; background-color: #e0e0e0; border-radius: 10px; height: 8px; margin: 4px 0; }
        .progress-fill { background-color: #2ecc71; height: 8px; border-radius: 10px; width: 0%; }
        .trend-chart { display: flex; gap: 6px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
        .trend-bar { width: 24px; background-color: #3498db; border-radius: 4px; text-align: center; color: white; font-size: 0.6rem; }
        .goal-input { width: 60px; padding: 4px; border: 1px solid #ccc; border-radius: 8px; text-align: center; }
        .mode-switch { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; background: #eef2ff; padding: 8px; border-radius: 40px; justify-content: center; }
        .mode-switch label { font-size: 0.8rem; font-weight: normal; display: flex; align-items: center; gap: 4px; }
    </style>
</head>
<body>
<div class="container">
    <header><h1>📚 智能考试系统 · 学习/练习/统计看板</h1><p>动态上传 | 哈希统计 | 错题本 | 进度跟踪 | 逐题/整卷练习</p></header>
    <div class="dashboard">
        <!-- 左侧题库管理 + 统计看板 -->
        <div class="library-panel">
            <div class="panel-title"><span>📂 题库管理</span><button class="btn-primary" id="addLibraryBtn" style="padding:4px 12px;">+ 添加Excel</button></div>
            <div id="librariesContainer">暂无题库，点击上方按钮添加 .xls/.xlsx 文件</div>
            <div id="ratioTotalMsg" class="total-ratio">📊 总比例: 0% (需为100%)</div>
            <div class="probability-buttons">
                <button class="btn btn-primary" id="btnUnseenWeight">🎲 未考过题概率增大</button>
                <button class="btn btn-warning" id="btnWrongWeight">⚠️ 错题概率增大</button>
            </div>
            <!-- 学习统计看板（增强版） -->
            <div class="panel-title" style="margin-top: 20px;"><span>📊 学习统计看板</span></div>
            <div id="statsPanel">
                <div class="control-group" style="justify-content: space-between; margin-bottom: 8px;">
                    <span>时间筛选：</span>
                    <select id="timeRangeSelect" style="padding:4px; border-radius:8px;">
                        <option value="all">全部</option>
                        <option value="week">本周</option>
                        <option value="month">本月</option>
                    </select>
                    <span>每日目标(题)：</span>
                    <input type="number" id="dailyGoal" class="goal-input" value="20" min="1" max="200">
                    <button id="setGoalBtn" class="btn-small" style="background:#2c3e50;">设置</button>
                </div>
                <div id="trendChart" class="trend-chart" style="justify-content: flex-start;"></div>
                <div id="progressSummary"></div>
                <table class="stats-table" id="statsTable"><thead><tr><th>题库</th><th>单选</th><th>多选</th><th>判断</th><th>掌握率</th><th>进度条</th></tr></thead><tbody></tbody></table>
                <div id="dailyProgress" style="margin-top:10px; font-size:0.75rem; text-align:center;"></div>
            </div>
        </div>
        <!-- 右侧考试区 -->
        <div class="exam-panel">
            <div class="control-panel">
                <div class="control-group"><label>单选</label><input type="number" id="numSingle" value="50" min="1" max="300"></div>
                <div class="control-group"><label>多选</label><input type="number" id="numMulti" value="30" min="1" max="200"></div>
                <div class="control-group"><label>判断</label><input type="number" id="numJudge" value="20" min="1" max="150"></div>
                <button class="btn btn-warning" onclick="startExam()">🎯 开始组卷</button>
                <button class="btn btn-success" onclick="submitExam()" id="submitBtn" disabled>📝 提交评分</button>
                <button class="btn btn-purple" onclick="exportWrongQuestions()" id="exportBtn" style="display:none;">📥 导出错题</button>
                <button class="btn btn-danger" onclick="restartCurrentWrong()" id="retryCurrentBtn" style="display:none;">🔄 本次错题重考</button>
                <span id="timer">00:00</span>
            </div>
            <div id="scoreResult"></div>
            <div id="examArea"></div>
        </div>
        <!-- 更多功能区域 -->
        <div class="func-panel">
            <div class="panel-title"><span>⚙️ 更多功能</span></div>
            <div class="more-menu">
                <button class="more-btn" id="moreBtn">▼ 展开菜单</button>
                <div id="moreDropdown" class="more-content">
                    <a id="learningModeBtn">📘 学习模式（展示题目+答案）</a>
                    <a id="practiceModeBtn">✏️ 练习模式（逐题/整卷可选）</a>
                    <a id="wrongComposeBtn">📋 错题组卷（基于错题本）</a>
                    <a id="unseenComposeBtn">🆕 未考题组卷</a>
                    <a id="showWrongListBtn">📖 错题本（完整展示错题）</a>
                    <a id="resetStatsBtn" style="color:#e74c3c;">🗑️ 重置所有统计数据</a>
                </div>
            </div>
            <div id="wrongPreviewArea" style="margin-top: 15px;"></div>
        </div>
    </div>
</div>

<script>
// ====================== 全局变量 ======================
let loadedLibraries = [];
let nextLibId = 1;
let currentExam = [];
let currentWrongQuestions = [];
let wrongBook = [];
let questionStats = {};
let examHistory = [];        // 存储每次考试/练习记录 { timestamp, score, total, mode }
let timerInterval = null;
let startTime = null;
let currentWeightMode = null;
let dailyGoal = 20;
let practiceModeType = 'whole'; // 'whole' 整卷模式, 'single' 逐题模式
let singlePracticeAnswered = {}; // 记录逐题模式下每道题是否已经提交过（防止重复统计）
let currentPracticeQuestions = []; // 当前练习模式的题目列表

// ====================== 初始化与存储 ======================
function loadStats() {
    const stored = localStorage.getItem('question_stats_v3');
    if(stored) questionStats = JSON.parse(stored);
    const storedWrong = localStorage.getItem('wrong_book_v3');
    if(storedWrong) wrongBook = JSON.parse(storedWrong);
    else wrongBook = [];
    const storedHistory = localStorage.getItem('exam_history_v1');
    if(storedHistory) examHistory = JSON.parse(storedHistory);
    else examHistory = [];
    const storedGoal = localStorage.getItem('daily_goal');
    if(storedGoal) dailyGoal = parseInt(storedGoal);
    document.getElementById('dailyGoal').value = dailyGoal;
}
function saveStats() {
    localStorage.setItem('question_stats_v3', JSON.stringify(questionStats));
    localStorage.setItem('wrong_book_v3', JSON.stringify(wrongBook));
    localStorage.setItem('exam_history_v1', JSON.stringify(examHistory));
    localStorage.setItem('daily_goal', dailyGoal);
}
function addExamRecord(score, total, mode) {
    examHistory.push({ timestamp: Date.now(), score, total, mode });
    if(examHistory.length > 30) examHistory.shift();
    saveStats();
}
function updateQuestionStat(qid, isCorrect) {
    if (!questionStats[qid]) questionStats[qid] = { total: 0, correct: 0, wrong: 0 };
    questionStats[qid].total++;
    if (isCorrect) questionStats[qid].correct++;
    else questionStats[qid].wrong++;
    saveStats();
}
function addToWrongBook(questionItem, userAnswer) {
    const existing = wrongBook.find(w => w.id === questionItem.id);
    if (existing) {
        existing.wrongCount = (existing.wrongCount || 1) + 1;
        existing.userAnswer = userAnswer;
    } else {
        wrongBook.push({
            id: questionItem.id, q: questionItem.q, type: questionItem.type,
            options: questionItem.options, answer: questionItem.answer,
            explanation: questionItem.explanation, libName: questionItem.libName,
            wrongCount: 1, userAnswer: userAnswer
        });
    }
    saveStats();
}
function removeFromWrongBook(qid) {
    wrongBook = wrongBook.filter(w => w.id !== qid);
    saveStats();
}
function showMessage(msg, isError = false) {
    let toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.textContent = msg;
    toast.style.backgroundColor = isError ? '#e74c3c' : '#2c3e50';
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000);
}
// 简单哈希
function simpleHash(str) {
    let hash = 5381;
    for (let i = 0; i < str.length; i++) hash = ((hash << 5) + hash) + str.charCodeAt(i);
    return hash >>> 0;
}
function getQuestionId(question, type, libName) {
    let content = type + "|" + question.q;
    if (type !== 'judge') {
        for (let k of ['A','B','C','D']) if (question.options[k]) content += "|" + k + ":" + question.options[k];
    }
    content += "|answer:" + question.answer + "|lib:" + libName;
    return simpleHash(content).toString();
}

// ====================== Excel解析 ======================
function parseWorkbookToQuestions(workbook) {
    const result = { single: [], multi: [], judge: [] };
    workbook.SheetNames.forEach(sheetName => {
        const lower = sheetName.toLowerCase();
        const sheet = workbook.Sheets[sheetName];
        const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        if (json.length < 2) return;
        if (lower.includes('单选')) parseSheetToType(json, 'single', result);
        else if (lower.includes('多选')) parseSheetToType(json, 'multi', result);
        else if (lower.includes('判断')) parseJudgeSheet(json, result);
    });
    return result;
}
function parseSheetToType(json, type, store) {
    const headers = json[0] || [];
    const qCol = findCol(headers, ['题目','题干','question']);
    const aCol = findCol(headers, ['答案','answer']);
    const optCols = findOptionCols(headers);
    if (qCol === -1 || aCol === -1) return;
    json.slice(1).forEach(row => {
        if (row[qCol] && row[aCol]) {
            let opts = {};
            optCols.forEach((idx, i) => { if (row[idx]) opts[String.fromCharCode(65+i)] = row[idx]; });
            store[type].push({
                q: row[qCol].toString().trim(),
                options: opts,
                answer: row[aCol].toString().trim().toUpperCase(),
                explanation: row[aCol+1] ? row[aCol+1].toString().trim() : "无解析"
            });
        }
    });
}
function parseJudgeSheet(json, store) {
    const headers = json[0] || [];
    const qCol = findCol(headers, ['题目','题干','question']);
    const aCol = findCol(headers, ['答案','answer','正确','对错']);
    if (qCol === -1 || aCol === -1) return;
    json.slice(1).forEach(row => {
        if (row[qCol] && row[aCol]) {
            let ans = row[aCol].toString().trim();
            if (/^(对|√|true|t|yes|y)$/i.test(ans)) ans = '对';
            if (/^(错|×|false|f|no|n)$/i.test(ans)) ans = '错';
            store.judge.push({
                q: row[qCol].toString().trim(),
                answer: ans,
                explanation: row[aCol+1] ? row[aCol+1].toString().trim() : "无解析"
            });
        }
    });
}
function findCol(headers, keywords) {
    for (let kw of keywords) {
        let idx = headers.findIndex(h => h && h.toString().toLowerCase().includes(kw.toLowerCase()));
        if (idx !== -1) return idx;
    }
    return -1;
}
function findOptionCols(headers) {
    let cols = [];
    headers.forEach((h, idx) => { if (h && /^[A-D]$/i.test(h.toString().trim())) cols.push(idx); });
    return cols;
}

// ====================== 题库管理 ======================
function addLibraryFromFile(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
        const questions = parseWorkbookToQuestions(wb);
        if (questions.single.length + questions.multi.length + questions.judge.length === 0) {
            showMessage(`文件 ${file.name} 未检测到有效题目`, true);
            return;
        }
        const assignIds = (arr, type, libName) => arr.map(q => ({ ...q, type, id: getQuestionId(q, type, libName), libName }));
        const libData = {
            single: assignIds(questions.single, 'single', file.name),
            multi: assignIds(questions.multi, 'multi', file.name),
            judge: assignIds(questions.judge, 'judge', file.name)
        };
        loadedLibraries.push({ id: nextLibId++, name: file.name, data: libData, stats: { single: libData.single.length, multi: libData.multi.length, judge: libData.judge.length }, ratio: 0 });
        autoDistributeRatio();
        renderLibraries();
        updateStatsPanel();
        showMessage(`✅ 添加 ${file.name} | 单选:${libData.single.length} 多选:${libData.multi.length} 判断:${libData.judge.length}`);
    };
    reader.readAsArrayBuffer(file);
}
function autoDistributeRatio() {
    if (!loadedLibraries.length) return;
    let eq = Math.floor(100 / loadedLibraries.length);
    let sum = 0;
    loadedLibraries.forEach((lib, i) => { if (i === loadedLibraries.length-1) lib.ratio = 100 - sum; else lib.ratio = eq; sum += lib.ratio; });
    renderLibraries();
}
function renderLibraries() {
    const container = document.getElementById('librariesContainer');
    if (!loadedLibraries.length) { container.innerHTML = '<div style="color:#6c757d; text-align:center; padding:20px;">暂无题库，点击上方按钮添加</div>'; document.getElementById('ratioTotalMsg').innerHTML = '📊 总比例: 0% (需为100%)'; updateStatsPanel(); return; }
    let html = '';
    loadedLibraries.forEach(lib => {
        html += `<div class="library-card"><div class="lib-header"><span class="lib-name">📄 ${escapeHtml(lib.name)}</span><button class="btn-small" onclick="removeLibrary(${lib.id})">删除</button></div>
                <div class="stat-badge"><span>🔘单选: ${lib.stats.single}</span><span>☑️多选: ${lib.stats.multi}</span><span>⚖️判断: ${lib.stats.judge}</span></div>
                <div class="ratio-control"><label>占比(%) :</label><input type="number" class="ratio-input" id="ratio_${lib.id}" value="${lib.ratio}" min="0" max="100" step="5" onchange="updateLibRatio(${lib.id}, this.value)"></div></div>`;
    });
    container.innerHTML = html;
    let total = loadedLibraries.reduce((s, l) => s + (l.ratio || 0), 0);
    document.getElementById('ratioTotalMsg').innerHTML = total === 100 ? '✅ 总比例: 100% (已就绪)' : `⚠️ 总比例: ${total}% (需等于100%)`;
    updateStatsPanel();
}
window.updateLibRatio = function(id, val) {
    let ratio = Math.min(100, Math.max(0, parseInt(val)||0));
    let lib = loadedLibraries.find(l => l.id === id);
    if (lib) lib.ratio = ratio;
    renderLibraries();
};
window.removeLibrary = function(id) {
    loadedLibraries = loadedLibraries.filter(l => l.id !== id);
    renderLibraries();
    document.getElementById('examArea').style.display = 'none';
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('retryCurrentBtn').style.display = 'none';
    stopTimer();
    updateStatsPanel();
    showMessage('已删除题库');
};

// ====================== 抽题权重 ======================
function getWeightForQuestion(qid) {
    if (currentWeightMode === 'unseen') { const stat = questionStats[qid]; return (!stat || stat.total === 0) ? 10 : 1; }
    if (currentWeightMode === 'wrong') { const stat = questionStats[qid]; return (stat && stat.wrong > 0) ? 1 + stat.wrong * 2 : 1; }
    return 1;
}
function weightedRandomPick(pool, n) {
    if (n === 0) return [];
    let items = pool.map(item => ({ item, weight: getWeightForQuestion(item.id) }));
    let totalWeight = items.reduce((s, i) => s + i.weight, 0);
    let result = [];
    for (let i = 0; i < n; i++) {
        let rand = Math.random() * totalWeight, acc = 0;
        for (let j = 0; j < items.length; j++) {
            acc += items[j].weight;
            if (rand <= acc) { result.push(items[j].item); totalWeight -= items[j].weight; items.splice(j,1); break; }
        }
    }
    return result;
}
function composeExamByRatios(totalS, totalM, totalJ) {
    let totalRatio = loadedLibraries.reduce((s, l) => s + (l.ratio || 0), 0);
    if (totalRatio !== 100) { showMessage(`比例总和需100%，当前${totalRatio}%`, true); return null; }
    let tasks = loadedLibraries.map(lib => ({ lib, needS:0, needM:0, needJ:0 }));
    let remainS = totalS, remainM = totalM, remainJ = totalJ;
    tasks.forEach(t => { let r = t.lib.ratio / 100; t.needS = Math.floor(totalS * r); t.needM = Math.floor(totalM * r); t.needJ = Math.floor(totalJ * r); remainS -= t.needS; remainM -= t.needM; remainJ -= t.needJ; });
    for (let i = 0; i < remainS; i++) tasks[i%tasks.length].needS++;
    for (let i = 0; i < remainM; i++) tasks[i%tasks.length].needM++;
    for (let i = 0; i < remainJ; i++) tasks[i%tasks.length].needJ++;
    for (let t of tasks) if (t.needS > t.lib.data.single.length || t.needM > t.lib.data.multi.length || t.needJ > t.lib.data.judge.length) { showMessage(`题库“${t.lib.name}”题目不足`, true); return null; }
    let singleList=[], multiList=[], judgeList=[];
    for (let t of tasks) { singleList.push(...weightedRandomPick(t.lib.data.single, t.needS)); multiList.push(...weightedRandomPick(t.lib.data.multi, t.needM)); judgeList.push(...weightedRandomPick(t.lib.data.judge, t.needJ)); }
    return [...singleList, ...multiList, ...judgeList];
}

// ====================== 通用考试渲染（支持逐题模式特殊处理） ======================
function renderPracticeExam(data, isSingleMode) {
    let html = '';
    data.forEach((item, idx) => {
        const qid = item.id;
        const alreadySubmitted = singlePracticeAnswered[qid] !== undefined;
        html += `<div class="question-block" id="q-${idx}" data-qid="${qid}">`;
        html += `<div class="question-title">${idx+1}. ${item.q}</div><div class="options" id="options-${idx}">`;
        if (item.type === 'judge') {
            html += `<label><input type="radio" name="ans_${idx}" value="对"> 对</label><label><input type="radio" name="ans_${idx}" value="错"> 错</label>`;
        } else {
            for (let k in item.options) {
                let inputType = item.type === 'single' ? 'radio' : 'checkbox';
                let nameAttr = item.type === 'single' ? `name="ans_${idx}"` : `name="ans_${idx}_${k}"`;
                html += `<label><input type="${inputType}" ${nameAttr} value="${k}"> ${k}. ${item.options[k]}</label>`;
            }
        }
        html += `</div>`;
        if (isSingleMode) {
            if (!alreadySubmitted) {
                html += `<button class="btn btn-primary" style="margin-top:10px;" onclick="checkSingleQuestion(${idx})">🔍 检查答案</button>`;
            } else {
                // 显示已提交的结果
                const result = singlePracticeAnswered[qid];
                const isCorrect = result.isCorrect;
                html += `<div class="result-feedback ${isCorrect?'correct':'incorrect'}">${isCorrect?'✅ 正确':'❌ 错误'} 正确答案: ${item.answer}<div class="explanation">📖 ${item.explanation}</div></div>`;
                // 标记正确/错误样式到选项
                setTimeout(() => markSelectedOption(idx, item, result.userAns), 0);
            }
        }
        html += `</div>`;
    });
    if (!isSingleMode) {
        html += `<div class="bottom-submit"><button class="btn btn-success" onclick="submitPracticeWhole()" style="font-size:16px;">✅ 提交全部并记录错题</button></div>`;
    }
    document.getElementById('examArea').innerHTML = html;
}
// 辅助：高亮选中的选项是否正确
function markSelectedOption(idx, item, userAns) {
    const optionsDiv = document.getElementById(`options-${idx}`);
    if (!optionsDiv) return;
    const labels = optionsDiv.querySelectorAll('label');
    labels.forEach(label => {
        const input = label.querySelector('input');
        if (!input) return;
        const val = input.value;
        if (item.type === 'multi') {
            // 多选比较复杂，简单处理：如果用户答案包含此选项则高亮
            if (userAns.includes(val)) {
                if (item.answer.includes(val)) label.classList.add('selected-correct');
                else label.classList.add('selected-wrong');
            }
        } else {
            if (val === userAns) {
                if (val === item.answer) label.classList.add('selected-correct');
                else label.classList.add('selected-wrong');
            }
        }
    });
}
// 逐题检查
function checkSingleQuestion(idx) {
    const item = currentPracticeQuestions[idx];
    const qid = item.id;
    if (singlePracticeAnswered[qid]) {
        showMessage('本题已经提交过了，不可重复提交', true);
        return;
    }
    let userAns = '';
    if (item.type === 'judge') {
        let sel = document.querySelector(`input[name="ans_${idx}"]:checked`);
        userAns = sel ? sel.value : '未作答';
    } else if (item.type === 'single') {
        let sel = document.querySelector(`input[name="ans_${idx}"]:checked`);
        userAns = sel ? sel.value : '未作答';
    } else {
        let checks = document.querySelectorAll(`input[name^="ans_${idx}_"]:checked`);
        userAns = Array.from(checks).map(c=>c.value).sort().join('');
    }
    if (userAns === '未作答') {
        showMessage('请先作答再检查', true);
        return;
    }
    let isCorrect = false;
    if (item.type === 'judge' || item.type === 'single') {
        isCorrect = (userAns === item.answer);
    } else {
        let correctSorted = item.answer.split('').sort().join('');
        isCorrect = (userAns === correctSorted);
    }
    // 记录统计
    updateQuestionStat(qid, isCorrect);
    if (!isCorrect) {
        addToWrongBook(item, userAns);
    } else {
        if (wrongBook.some(w => w.id === qid)) removeFromWrongBook(qid);
    }
    // 记录本次提交
    singlePracticeAnswered[qid] = { isCorrect, userAns };
    // 重新渲染当前题目（显示结果）
    const block = document.getElementById(`q-${idx}`);
    if (block) {
        const feedbackDiv = document.createElement('div');
        feedbackDiv.className = `result-feedback ${isCorrect?'correct':'incorrect'}`;
        feedbackDiv.innerHTML = `${isCorrect?'✅ 正确':'❌ 错误'} 正确答案: ${item.answer}<div class="explanation">📖 ${item.explanation}</div>`;
        // 移除原有的按钮，添加反馈
        const oldBtn = block.querySelector('button');
        if (oldBtn) oldBtn.remove();
        block.appendChild(feedbackDiv);
        markSelectedOption(idx, item, userAns);
    }
    // 更新统计看板
    updateStatsPanel();
    addExamRecord(isCorrect?1:0, 1, 'practice_single');
    showMessage(isCorrect ? '回答正确！' : '回答错误，已记录错题');
}
// 整卷练习提交
function submitPracticeWhole() {
    if (!currentPracticeQuestions.length) return;
    let score = 0, wrongs = [];
    currentPracticeQuestions.forEach((item, idx) => {
        let isCorrect = false, userAns = '';
        if (item.type === 'judge') {
            let sel = document.querySelector(`input[name="ans_${idx}"]:checked`);
            userAns = sel ? sel.value : '未作答';
            isCorrect = (userAns === item.answer);
        } else if (item.type === 'single') {
            let sel = document.querySelector(`input[name="ans_${idx}"]:checked`);
            userAns = sel ? sel.value : '未作答';
            isCorrect = (userAns === item.answer);
        } else {
            let checks = document.querySelectorAll(`input[name^="ans_${idx}_"]:checked`);
            userAns = Array.from(checks).map(c=>c.value).sort().join('');
            let correctSorted = item.answer.split('').sort().join('');
            isCorrect = (userAns === correctSorted);
        }
        if (userAns !== '未作答') updateQuestionStat(item.id, isCorrect);
        if (isCorrect) { score++; if (wrongBook.some(w => w.id === item.id)) removeFromWrongBook(item.id); }
        else { if (userAns !== '未作答') addToWrongBook(item, userAns); wrongs.push(item); }
        let div = document.getElementById(`q-${idx}`);
        let fb = document.createElement('div');
        fb.className = `result-feedback ${isCorrect?'correct':'incorrect'}`;
        fb.innerHTML = `${isCorrect?'✅ 正确':'❌ 错误'} 正确答案: ${item.answer}<div class="explanation">📖 ${item.explanation}</div>`;
        div.appendChild(fb);
    });
    let resultDiv = document.getElementById('scoreResult');
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = `📊 练习结束！得分: ${score} / ${currentPracticeQuestions.length}`;
    addExamRecord(score, currentPracticeQuestions.length, 'practice_whole');
    updateStatsPanel();
    // 禁用提交按钮
    const submitBtn = document.querySelector('#examArea .bottom-submit button');
    if (submitBtn) submitBtn.disabled = true;
    showMessage(`练习完成，得分 ${score}/${currentPracticeQuestions.length}`);
}

// 正常考试入口
function startExam() {
    if (!loadedLibraries.length) { showMessage('请先添加题库', true); return; }
    let total = loadedLibraries.reduce((s,l)=>s+(l.ratio||0),0);
    if (total !== 100) { showMessage(`比例总和必须100%，当前${total}%`, true); return; }
    let totalS = parseInt(document.getElementById('numSingle').value);
    let totalM = parseInt(document.getElementById('numMulti').value);
    let totalJ = parseInt(document.getElementById('numJudge').value);
    let exam = composeExamByRatios(totalS, totalM, totalJ);
    if (!exam) return;
    currentExam = exam;
    currentWrongQuestions = [];
    renderExam(currentExam, false);
    document.getElementById('examArea').style.display = 'block';
    document.getElementById('scoreResult').style.display = 'none';
    document.getElementById('exportBtn').style.display = 'none';
    document.getElementById('retryCurrentBtn').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
    stopTimer(); startTimer();
}
function renderExam(data, showAnswers) {
    let html = '';
    data.forEach((item, idx) => {
        html += `<div class="question-block" id="q-${idx}"><div class="question-title">${idx+1}. ${item.q}</div><div class="options">`;
        if (item.type === 'judge') {
            html += `<label><input type="radio" name="ans_${idx}" value="对"> 对</label><label><input type="radio" name="ans_${idx}" value="错"> 错</label>`;
        } else {
            for (let k in item.options) {
                let inputType = item.type === 'single' ? 'radio' : 'checkbox';
                let nameAttr = item.type === 'single' ? `name="ans_${idx}"` : `name="ans_${idx}_${k}"`;
                html += `<label><input type="${inputType}" ${nameAttr} value="${k}"> ${k}. ${item.options[k]}</label>`;
            }
        }
        if (showAnswers) {
            html += `<div class="result-feedback correct" style="margin-top:10px;">✅ 正确答案: ${item.answer}<div class="explanation">📖 ${item.explanation}</div></div>`;
        }
        html += `</div></div>`;
    });
    if (!showAnswers) html += `<div class="bottom-submit"><button class="btn btn-success" onclick="submitExam()" style="font-size:16px;">✅ 提交评分并定位错题</button></div>`;
    document.getElementById('examArea').innerHTML = html;
}
function submitExam() {
    if (!currentExam.length) return;
    if (document.getElementById('submitBtn').disabled) return;
    document.getElementById('submitBtn').disabled = true;
    stopTimer();
    let score = 0, firstWrongIndex = -1;
    currentExam.forEach((item, idx) => {
        let isCorrect = false, userAns = '';
        if (item.type === 'judge') {
            let sel = document.querySelector(`input[name="ans_${idx}"]:checked`);
            userAns = sel ? sel.value : '未作答';
            isCorrect = (userAns === item.answer);
        } else if (item.type === 'single') {
            let sel = document.querySelector(`input[name="ans_${idx}"]:checked`);
            userAns = sel ? sel.value : '未作答';
            isCorrect = (userAns === item.answer);
        } else {
            let checks = document.querySelectorAll(`input[name^="ans_${idx}_"]:checked`);
            userAns = Array.from(checks).map(c=>c.value).sort().join('');
            let correctSorted = item.answer.split('').sort().join('');
            isCorrect = (userAns === correctSorted);
        }
        if (userAns !== '未作答') updateQuestionStat(item.id, isCorrect);
        if (isCorrect) { score++; if (wrongBook.some(w => w.id === item.id)) removeFromWrongBook(item.id); }
        else { if (firstWrongIndex === -1) firstWrongIndex = idx; if (userAns !== '未作答') addToWrongBook(item, userAns); }
        let div = document.getElementById(`q-${idx}`);
        let fb = document.createElement('div');
        fb.className = `result-feedback ${isCorrect?'correct':'incorrect'}`;
        fb.innerHTML = `${isCorrect?'✅ 正确':'❌ 错误'} 正确答案: ${item.answer}<div class="explanation">📖 ${item.explanation}</div>`;
        div.appendChild(fb);
    });
    let elapsed = Date.now() - startTime;
    let minutes = Math.floor(elapsed/60000), seconds = Math.floor((elapsed%60000)/1000);
    let resultDiv = document.getElementById('scoreResult');
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = `📊 考试结束！得分: ${score} / ${currentExam.length} &nbsp; ⏱️ ${minutes}分${seconds}秒`;
    document.getElementById('exportBtn').style.display = 'inline-block';
    if (currentExam.filter((_,idx)=> document.querySelector(`input[name="ans_${idx}"]:checked`) === null).length < currentExam.length) {
        // 只有有作答的才显示重考
        let wrongExists = currentExam.some((_,idx)=> {
            let sel = document.querySelector(`input[name="ans_${idx}"]:checked`);
            if (!sel) return false;
            let userAns = sel.value;
            let item = currentExam[idx];
            if (item.type === 'judge' || item.type === 'single') return userAns !== item.answer;
            else return false;
        });
        if (wrongExists) document.getElementById('retryCurrentBtn').style.display = 'inline-block';
    }
    if (firstWrongIndex !== -1) document.getElementById(`q-${firstWrongIndex}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
    addExamRecord(score, currentExam.length, 'exam');
    updateStatsPanel();
}

// ====================== 统计看板 ======================
function updateStatsPanel() {
    if (!loadedLibraries.length) { document.getElementById('statsTable').querySelector('tbody').innerHTML = '<tr><td colspan="6">暂无题库</td></tr>'; return; }
    const range = document.getElementById('timeRangeSelect').value;
    let filteredHistory = examHistory;
    const now = Date.now();
    if (range === 'week') { const weekAgo = now - 7*24*3600*1000; filteredHistory = examHistory.filter(h => h.timestamp >= weekAgo); }
    if (range === 'month') { const monthAgo = now - 30*24*3600*1000; filteredHistory = examHistory.filter(h => h.timestamp >= monthAgo); }
    const trendDiv = document.getElementById('trendChart');
    trendDiv.innerHTML = '<div style="width:100%; font-size:0.7rem;">最近10次得分率趋势：</div>';
    let last10 = filteredHistory.slice(-10);
    last10.forEach((rec) => {
        let rate = (rec.score/rec.total)*100;
        let height = Math.max(15, rate/2);
        trendDiv.innerHTML += `<div class="trend-bar" style="height:${height}px;" title="${rec.mode} ${rate.toFixed(0)}%">${rate.toFixed(0)}</div>`;
    });
    const tbody = document.querySelector('#statsTable tbody');
    let totalMastered = 0, totalQuestions = 0;
    let rows = '';
    for (let lib of loadedLibraries) {
        let mastered=0, total=0;
        for (let q of lib.data.single) { total++; let s=questionStats[q.id]; if(s && s.correct>=2) mastered++; }
        for (let q of lib.data.multi) { total++; let s=questionStats[q.id]; if(s && s.correct>=2) mastered++; }
        for (let q of lib.data.judge) { total++; let s=questionStats[q.id]; if(s && s.correct>=2) mastered++; }
        totalMastered += mastered; totalQuestions += total;
        let percent = total===0?0:(mastered/total*100);
        rows += `<tr><td>${escapeHtml(lib.name)}</td><td>${lib.data.single.filter(q=>questionStats[q.id]?.total>0).length}/${lib.data.single.length}</td><td>${lib.data.multi.filter(q=>questionStats[q.id]?.total>0).length}/${lib.data.multi.length}</td><td>${lib.data.judge.filter(q=>questionStats[q.id]?.total>0).length}/${lib.data.judge.length}</td><td>${percent.toFixed(0)}%</td>
        <td><div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div></td></tr>`;
    }
    tbody.innerHTML = rows;
    document.getElementById('progressSummary').innerHTML = `<div style="margin-top:5px;"><strong>总体掌握率：</strong> ${totalQuestions===0?0:(totalMastered/totalQuestions*100).toFixed(0)}% (${totalMastered}/${totalQuestions})</div>`;
    let todayStart = new Date(); todayStart.setHours(0,0,0,0);
    let todayDone = examHistory.filter(h => h.timestamp >= todayStart.getTime()).reduce((sum, h) => sum + h.total, 0);
    let dailyPercent = Math.min(100, (todayDone/dailyGoal)*100);
    document.getElementById('dailyProgress').innerHTML = `📅 今日完成 ${todayDone} / ${dailyGoal} 题 <div class="progress-bar"><div class="progress-fill" style="width:${dailyPercent}%; background:#f39c12;"></div></div>`;
}

function startTimer() { if(timerInterval) clearInterval(timerInterval); startTime = Date.now(); timerInterval = setInterval(()=>{ let e=Date.now()-startTime; let m=Math.floor(e/60000), s=Math.floor((e%60000)/1000); document.getElementById('timer').innerText=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; },1000); }
function stopTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval=null; }
function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
